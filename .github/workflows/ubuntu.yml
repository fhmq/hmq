name: Ubuntu build

on: [push, pull_request]

jobs:
    
    build:
      runs-on: ubuntu-latest
      steps:
      - uses: actions/checkout@v2

      - name: Set up Go
        uses: actions/setup-go@v2
        with:
          go-version: "1.25.x"

      - name: Build
        run: go build -v ./...
